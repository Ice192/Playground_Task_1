<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Cart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="smartcart_cal.js" defer></script>
</head>
<body class="min-h-screen bg-gradient-to-b from-slate-100 to-slate-200 text-slate-900">
    <main class="mx-auto max-w-5xl px-4 py-10 md:py-14">
        <section class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-lg">
            <header class="bg-slate-900 px-6 py-6 text-white md:px-8">
                <p class="text-xs uppercase tracking-[0.2em] text-slate-300">Smart Cart</p>
                <h1 class="mt-2 text-2xl font-bold md:text-3xl">Calculator Dashboard</h1>
            </header>

            <div class="grid gap-6 p-6 md:grid-cols-2 md:gap-8 md:p-8">
                <div class="rounded-xl border border-slate-200 bg-slate-50 p-5">
                    <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-500">Input Item</h2>
                    <div class="item mt-4 space-y-4">
                        <div>
                            <label for="item-name" class="mb-2 block text-sm font-medium text-slate-700">Name</label>
                            <input id="item-name" type="text" placeholder="Product name" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2.5 text-sm outline-none transition focus:border-slate-500 focus:ring-2 focus:ring-slate-300">
                        </div>
                        <div>
                            <label for="item-price" class="mb-2 block text-sm font-medium text-slate-700">Price</label>
                            <input id="item-price" type="number" placeholder="Price" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2.5 text-sm outline-none transition focus:border-slate-500 focus:ring-2 focus:ring-slate-300">
                        </div>
                        <div>
                            <label for="item-qty" class="mb-2 block text-sm font-medium text-slate-700">Quantity</label>
                            <input id="item-qty" type="number" placeholder="Quantity" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2.5 text-sm outline-none transition focus:border-slate-500 focus:ring-2 focus:ring-slate-300">
                        </div>
                    </div>
                    <button id="calculate" type="button" class="mt-5 inline-flex rounded-lg bg-slate-900 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-slate-400">
                        Calculate
                    </button>
                </div>

                <div class="rounded-xl border border-slate-200 bg-white p-5">
                    <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-500">Summary</h2>
                    <div class="mt-4 space-y-3">
                        <div class="flex items-center justify-between rounded-lg border border-slate-200 bg-slate-50 px-4 py-3">
                            <span class="text-sm font-medium text-slate-600">Subtotal</span>
                            <span class="text-lg font-bold text-slate-900">Rp <span id="subtotal">-</span></span>
                        </div>
                        <div class="flex items-center justify-between rounded-lg border border-slate-200 bg-slate-50 px-4 py-3">
                            <span class="text-sm font-medium text-slate-600">Diskon</span>
                            <span class="text-lg font-bold text-slate-900">Rp <span id="discount">-</span></span>
                        </div>
                        <div class="flex items-center justify-between rounded-lg border border-slate-200 bg-slate-50 px-4 py-3">
                            <span class="text-sm font-medium text-slate-600">Harga setelah diskon</span>
                            <span class="text-lg font-bold text-slate-900">Rp <span id="after-discount">-</span></span>
                        </div>
                        <div class="flex items-center justify-between rounded-lg border border-slate-200 bg-slate-50 px-4 py-3">
                            <span class="text-sm font-medium text-slate-600">Tax (11%)</span>
                            <span class="text-lg font-bold text-slate-900">Rp <span id="tax">-</span></span>
                        </div>
                        <div class="flex items-center justify-between rounded-lg border border-emerald-200 bg-emerald-50 px-4 py-3">
                            <span class="text-sm font-semibold text-emerald-700">Total Belanja</span>
                            <span class="text-lg font-bold text-emerald-700">Rp <span id="total">-</span></span>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
