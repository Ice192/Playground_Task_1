<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Cart</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="smartcart_cal.js" defer></script>
</head>
<body class="min-h-screen bg-gradient-to-b text-slate-900">
  <main class="mx-auto max-w-5xl px-4 py-10 md:py-14">
    <section class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-lg">
      <!-- App Header -->
      <header class="bg-slate-900 px-6 py-6 text-white md:px-8">
        <h1 class="mt-2 text-2xl font-bold md:text-3xl">Smart Cart Calculator</h1>
      </header>

      <div class="grid gap-6 p-6 md:grid-cols-2 md:gap-8 md:p-8">
        <div class="rounded-xl border border-slate-200 bg-slate-50 p-5">
          <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-500">
            Input Item
          </h2>

          <!-- Field Group: Item Form -->
          <div class="item mt-4 space-y-4">
            <!-- Field: Name -->
            <div>
              <label
                for="item-name"
                class="mb-2 block text-sm font-medium text-slate-700"
              >
                Name
              </label>
              <input
                id="item-name"
                type="text"
                placeholder="Product name"
                class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2.5 text-sm outline-none transition focus:border-slate-500 focus:ring-2 focus:ring-slate-300"
              >
            </div>

            <!-- Field: Price -->
            <div>
              <label
                for="item-price"
                class="mb-2 block text-sm font-medium text-slate-700"
              >
                Price
              </label>
              <input
                id="item-price"
                type="number"
                placeholder="Price"
                class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2.5 text-sm outline-none transition focus:border-slate-500 focus:ring-2 focus:ring-slate-300"
              >
            </div>

            <!-- Field: Quantity -->
            <div>
              <label
                for="item-qty"
                class="mb-2 block text-sm font-medium text-slate-700"
              >
                Quantity
              </label>
              <input
                id="item-qty"
                type="number"
                placeholder="Quantity"
                class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2.5 text-sm outline-none transition focus:border-slate-500 focus:ring-2 focus:ring-slate-300"
              >
            </div>
          </div>

          <!-- Action Buttons -->
          <div class="mt-5 flex flex-wrap gap-2">
            <button
              id="clear-items"
              type="button"
              class="inline-flex rounded-lg border border-slate-300 bg-white px-4 py-2.5 text-sm font-semibold text-slate-700 transition hover:bg-slate-100 focus:outline-none focus:ring-2 focus:ring-slate-300"
            >
              Clear
            </button>
            <button
              id="calculate"
              type="button"
              class="inline-flex rounded-lg bg-emerald-600 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-300"
            >
              Calculate
            </button>
          </div>

          <!-- Saved Items Preview -->
          <div class="mt-4 rounded-lg border border-slate-200 bg-white p-3">
            <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">
              Daftar Barang
            </p>
            <ul id="item-list" class="mt-2 space-y-1 text-sm text-slate-700">
              <li class="text-slate-400">Belum ada barang.</li>
            </ul>
          </div>
        </div>

        <!-- Summary Panel -->
        <div class="rounded-xl border border-slate-200 bg-white p-5">
          <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-500">
            Summary
          </h2>

          <!-- Summary Rows -->
          <div class="mt-4 space-y-3">
            <!-- Row: Subtotal -->
            <div
              class="flex items-center justify-between rounded-lg border border-slate-200 bg-slate-50 px-4 py-3"
            >
              <span class="text-sm font-medium text-slate-600">Subtotal</span>
              <span class="text-lg font-bold text-slate-900">
                Rp <span id="subtotal">0</span>
              </span>
            </div>

            <!-- Row: Discount -->
            <div
              class="flex items-center justify-between rounded-lg border border-slate-200 bg-slate-50 px-4 py-3"
            >
              <span class="text-sm font-medium text-slate-600">Diskon</span>
              <span class="text-lg font-bold text-slate-900">
                Rp <span id="discount">0</span>
              </span>
            </div>

            <!-- Row: After Discount -->
            <div
              class="flex items-center justify-between rounded-lg border border-slate-200 bg-slate-50 px-4 py-3"
            >
              <span class="text-sm font-medium text-slate-600">Harga setelah diskon</span>
              <span class="text-lg font-bold text-slate-900">
                Rp <span id="after-discount">0</span>
              </span>
            </div>

            <!-- Row: Tax -->
            <div
              class="flex items-center justify-between rounded-lg border border-slate-200 bg-slate-50 px-4 py-3"
            >
              <span class="text-sm font-medium text-slate-600">Tax (11%)</span>
              <span class="text-lg font-bold text-slate-900">
                Rp <span id="tax">0</span>
              </span>
            </div>

            <!-- Row: Final Total -->
            <div
              class="flex items-center justify-between rounded-lg border border-emerald-200 bg-emerald-50 px-4 py-3"
            >
              <span class="text-sm font-semibold text-emerald-700">Total Belanja</span>
              <span class="text-lg font-bold text-emerald-700">
                Rp <span id="total">0</span>
              </span>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
